name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: europe-west1
  SERVICE: aeo-intelligence-agent
  IMAGE: europe-west1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/aeo-intelligence-agent/app

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          secrets: |
            FIRECRAWL_API_KEY=FIRECRAWL_API_KEY:latest
            ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest
            INTERNAL_API_KEY=INTERNAL_API_KEY:latest
            LANGSMITH_API_KEY=LANGSMITH_API_KEY:latest
          env_vars: |
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}
            LANGSMITH_TRACING=true
            LANGSMITH_ENDPOINT=https://eu.api.smith.langchain.com
            LANGSMITH_PROJECT=${{ vars.LANGSMITH_PROJECT }}
